<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400&amp;family=Roboto+Slab:wght@700&amp;display=swap');
    .main-text {
      font-family: 'Roboto Slab', serif;
      font-size: 85px;
      font-weight: 700;
      fill: #ffffff;
      paint-order: stroke fill;
      stroke: #E55524;
      stroke-width: 3px;
      stroke-linejoin: round;
    }
    .sub-text {
      font-family: 'Open Sans', sans-serif;
      font-size: 24px;
      font-weight: 400;
      fill: #E55524;
      letter-spacing: 2px;
    }
  </style>
  <!-- Main text -->
  <text x="50" y="100" class="main-text">NAILED I</text>
  <!-- Hammer/nail icon — white fill, orange stroke -->
  <g transform="translate(460, 25)">
    <rect x="0" y="0" width="70" height="12" fill="#ffffff" stroke="#E55524" stroke-width="2" rx="2" />
    <rect x="5" y="12" width="60" height="8" fill="#ffffff" stroke="#E55524" stroke-width="2" />
    <rect x="25" y="20" width="20" height="60" fill="#ffffff" stroke="#E55524" stroke-width="2" />
    <polygon points="25,80 45,80 35,105" fill="#E55524" />
  </g>
  <!-- Orange divider line -->
  <line x1="50" y1="140" x2="560" y2="140" stroke="#E55524" stroke-width="4" />
  <!-- Subtitle -->
  <text x="50" y="180" class="sub-text">GENERAL MAINTENANCE SOLUTIONS</text>
</svg>
